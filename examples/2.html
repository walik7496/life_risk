<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Age Calculator PRO+</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #111827);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      width: 380px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.5);
      text-align: center;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 10px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
    }

    button {
      background: #3b82f6;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #2563eb;
      transform: scale(1.03);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 15px;
    }

    .box {
      background: rgba(255,255,255,0.08);
      padding: 10px;
      border-radius: 10px;
    }

    .num {
      font-size: 18px;
      font-weight: bold;
    }

    .label {
      font-size: 12px;
      opacity: 0.7;
    }

    .bar {
      margin-top: 15px;
      height: 10px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      width: 0%;
      background: #3b82f6;
      transition: 0.5s;
    }

    .small {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 8px;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>🔥 Age Calculator PRO+</h1>

  <input type="date" id="date">
  <input type="time" id="time" value="00:00">
  <input type="number" id="life" placeholder="Очікувана тривалість життя (80/100)" value="80">

  <button onclick="start()">Старт</button>

  <div class="bar">
    <div class="fill" id="fill"></div>
  </div>

  <div class="small" id="percent">0%</div>

  <div class="grid">
    <div class="box"><div class="num" id="years">0</div><div class="label">Роки</div></div>
    <div class="box"><div class="num" id="months">0</div><div class="label">Місяці</div></div>
    <div class="box"><div class="num" id="days">0</div><div class="label">Дні</div></div>
    <div class="box"><div class="num" id="hours">0</div><div class="label">Години</div></div>
    <div class="box"><div class="num" id="minutes">0</div><div class="label">Хвилини</div></div>
    <div class="box"><div class="num" id="seconds">0</div><div class="label">Секунди</div></div>
  </div>
</div>

<script>
let timer;

function start() {
  if (timer) clearInterval(timer);

  timer = setInterval(() => {
    const d = document.getElementById("date").value;
    const t = document.getElementById("time").value;
    const life = parseInt(document.getElementById("life").value || 80);

    if (!d) return;

    const birth = new Date(d + "T" + t);
    const now = new Date();
    const diff = now - birth;

    if (diff < 0) return;

    const seconds = Math.floor(diff / 1000);
    const minutes = Math.floor(seconds / 60);
    const hours = Math.floor(minutes / 60);
    const days = Math.floor(hours / 24);
    const months = Math.floor(days / 30.44);
    const years = Math.floor(days / 365.25);

    // progress to life expectancy
    const percent = Math.min((years / life) * 100, 100).toFixed(2);

    document.getElementById("years").innerText = years;
    document.getElementById("months").innerText = months;
    document.getElementById("days").innerText = days;
    document.getElementById("hours").innerText = hours;
    document.getElementById("minutes").innerText = minutes;
    document.getElementById("seconds").innerText = seconds;

    document.getElementById("fill").style.width = percent + "%";
    document.getElementById("percent").innerText = percent + "% життя прожито";

  }, 1000);
}
</script>

</body>
</html>
