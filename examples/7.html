<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LIFE OS — FINAL GOD MODE++</title>

  <!-- PWA -->
  <link rel="manifest" href="data:application/manifest+json,{\"name\":\"LIFE OS GOD MODE++\",\"short_name\":\"LIFEOS++\",\"start_url\":\".\",\"display\":\"standalone\",\"background_color\":\"#020617\",\"theme_color\":\"#0f172a\"}" />

  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:radial-gradient(circle at top,#0b1020,#020617);
      color:white;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }

    canvas#bg{
      position:fixed;
      inset:0;
      z-index:0;
    }

    .card{
      position:relative;
      z-index:2;
      width:500px;
      background:rgba(255,255,255,0.06);
      backdrop-filter:blur(18px);
      padding:20px;
      border-radius:22px;
      box-shadow:0 30px 90px rgba(0,0,0,0.75);
      text-align:center;
    }

    h1{font-size:20px;margin-bottom:10px;}

    input,button{
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      border-radius:10px;
      font-size:14px;
    }

    button{
      background:#3b82f6;
      color:white;
      cursor:pointer;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:15px;
    }

    .box{
      background:rgba(255,255,255,0.08);
      padding:10px;
      border-radius:10px;
    }

    .num{font-size:18px;font-weight:bold;}
    .label{font-size:12px;opacity:0.7;}

    .bar{
      height:10px;
      margin-top:10px;
      background:rgba(255,255,255,0.1);
      border-radius:10px;
      overflow:hidden;
    }

    .fill{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#3b82f6,#22c55e);
    }

    canvas#timeline{
      margin-top:10px;
      width:100%;
      height:120px;
      background:rgba(255,255,255,0.05);
      border-radius:10px;
    }

    .status{
      margin-top:10px;
      font-size:13px;
      opacity:0.9;
      text-align:left;
    }

    .missions{
      margin-top:10px;
      font-size:12px;
      opacity:0.8;
      text-align:left;
    }
  </style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="card">
  <h1>🔥 LIFE OS — FINAL GOD MODE++</h1>

  <input type="date" id="date">
  <input type="time" id="time" value="00:00">
  <input type="number" id="life" value="80" placeholder="Life expectancy">

  <button onclick="start()">INITIALIZE REALITY ENGINE</button>

  <div class="bar"><div class="fill" id="fill"></div></div>
  <div id="percent" style="font-size:12px;margin-top:5px">0%</div>

  <canvas id="timeline"></canvas>

  <div class="grid">
    <div class="box"><div class="num" id="years">0</div><div class="label">Years</div></div>
    <div class="box"><div class="num" id="days">0</div><div class="label">Days</div></div>
    <div class="box"><div class="num" id="hours">0</div><div class="label">Hours</div></div>
    <div class="box"><div class="num" id="minutes">0</div><div class="label">Minutes</div></div>
  </div>

  <div class="status" id="status">🧠 SYSTEM: standby</div>
  <div class="missions" id="missions">🎯 Missions: unlock age 18, 30, 50, 70</div>
</div>

<script>

// ===== STARFIELD =====
const bg=document.getElementById("bg");
const b=bg.getContext("2d");
bg.width=innerWidth;
bg.height=innerHeight;

let stars=Array.from({length:120},()=>({
  x:Math.random()*bg.width,
  y:Math.random()*bg.height,
  z:Math.random()*2+0.2
}));

function drawStars(){
  b.clearRect(0,0,bg.width,bg.height);
  stars.forEach(s=>{
    s.y+=s.z*1.2;
    if(s.y>bg.height)s.y=0;

    b.fillStyle="rgba(255,255,255,0.3)";
    b.fillRect(s.x,s.y,s.z,s.z);
  });
  requestAnimationFrame(drawStars);
}
drawStars();

// ===== TIMELINE =====
const t=document.getElementById("timeline");
const c=t.getContext("2d");
t.width=460;t.height=120;
let hist=[];

function render(){
  c.clearRect(0,0,t.width,t.height);
  c.beginPath();
  c.strokeStyle="#22c55e";

  hist.forEach((v,i)=>{
    let x=i*(t.width/120);
    let y=t.height-(v/100*t.height);
    if(i===0)c.moveTo(x,y);
    else c.lineTo(x,y);
  });
  c.stroke();
}

// ===== SOUND ENGINE =====
const audio=new AudioContext();
function beep(freq){
  let o=audio.createOscillator();
  let g=audio.createGain();
  o.connect(g);g.connect(audio.destination);
  o.frequency.value=freq;
  o.start();o.stop(audio.currentTime+0.05);
}

// ===== SYSTEM =====
let timer;
let xp=0;
let level=0;

function ai(age,p){
  if(p<10) return "SYSTEM BOOTING REALITY MODEL";
  if(p<40) return "BUILDING HUMAN PROFILE";
  if(p<70) return "SIMULATION RUNNING";
  return "ENDGAME MODE ACTIVE";
}

function missions(age){
  let m=[];
  if(age>=18) m.push("✔ adult unlocked");
  if(age>=30) m.push("✔ career stage unlocked");
  if(age>=50) m.push("✔ mastery phase unlocked");
  if(age>=70) m.push("✔ legacy mode active");
  return m.join(" | ");
}

function start(){
  if(timer) clearInterval(timer);

  timer=setInterval(()=>{
    const d=date.value;
    const tme=time.value;
    const life=+document.getElementById("life").value;

    if(!d) return;

    const birth=new Date(d+"T"+tme);
    const now=new Date();
    const diff=now-birth;

    let sec=diff/1000;
    let min=sec/60;
    let hr=min/60;
    let days=hr/24;
    let years=days/365.25;

    let pct=Math.min((years/life)*100,100);

    years=Math.floor(years);

    document.getElementById("years").innerText=years;
    document.getElementById("days").innerText=Math.floor(days);
    document.getElementById("hours").innerText=Math.floor(hr);
    document.getElementById("minutes").innerText=Math.floor(min);

    fill.style.width=pct+"%";
    percent.innerText=pct.toFixed(2)+"% LIFE COMPLETED";

    xp+=1;
    level=Math.floor(xp/120);

    status.innerText="🧠 SYSTEM: "+ai(years,pct);
    missionsEl.innerText="🎯 Missions: "+missions(years);

    if(Math.floor(pct)%10===0) beep(200+years*2);

    hist.push(pct);
    if(hist.length>120)hist.shift();
    render();

  },1000);
}

const fill=document.getElementById("fill");
const percent=document.getElementById("percent");
const status=document.getElementById("status");
const missionsEl=document.getElementById("missions");

</script>

</body>
</html>
